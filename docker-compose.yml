services:
  postgres_db:
    image: postgres:15
    container_name: faq_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: faq_support
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: faq_qdrant
    ports:
      - "6333:6333" # Port API Qdrant (Rest API)
      - "6334:6334" # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  pgdata:
  qdrant_storage:
